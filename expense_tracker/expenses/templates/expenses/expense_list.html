{% extends 'expenses/base.html' %}

{% block content %}

<h1 class="mb-4">All Expenses</h1>

<a href="{% url 'add_expense' %}" class="btn btn-primary mb-4">
    Add Expense
</a>

<div class="row">

    {% for expense in expenses %}

        <div class="col-md-4">

            <div class="card mb-4 shadow-sm">

                <div class="card-body">

                    <h5 class="card-title">
                        {{ expense.category.name }}
                    </h5>

                    <p class="card-text">
                        ₹{{ expense.amount }}
                    </p>

                    <p>
                        {{ expense.description }}
                    </p>

                    <small class="d-block mb-3">
                        {{ expense.user.username }}
                    </small>

                    <!-- Update Button -->

                    <a href="{% url 'update_expense' expense.id %}"
                    class="btn btn-warning btn-sm">

                        Edit

                    </a>

                    <!-- Delete Button -->

                    <a href="{% url 'delete_expense' expense.id %}"
                    class="btn btn-danger btn-sm">

                        Delete

                    </a>

                </div>

            </div>

        </div>

    {% endfor %}

</div>

{% endblock %}
